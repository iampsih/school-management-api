default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: school_management_api_development

test:
  <<: *default
  database: school_management_api_test

production:
  <<: *default
  database: school_management_api_production
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>